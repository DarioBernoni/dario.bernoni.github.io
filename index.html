
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penalty CV - Dario Bernoni</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="background-glow"></div>

  <main class="container">

    <section id="start-screen" class="screen active">
      <div class="logo">⚽</div>
      <h1>Penalty CV</h1>
      <p class="subtitle">
        Hai 5 rigori per scoprire chi sono.
      </p>

      <div class="card">
        <p>Durata esperienza: circa 1 minuto</p>
      </div>

      <button id="start-btn" class="primary-btn">
        Inizia
      </button>
    </section>

    <section id="game-screen" class="screen">
      <div class="top-bar">
        <span id="shot-counter">Rigore 1/5</span>
      </div>

      <div class="goal-area">
        <div class="goal"></div>
        <div class="goalkeeper">🧤</div>
        <div id="ball" class="ball">⚽</div>
      </div>

      <div class="target-grid">

  <div class="target" data-x="-120" data-y="-220"></div>
  <div class="target" data-x="0" data-y="-220"></div>
  <div class="target" data-x="120" data-y="-220"></div>

  <div class="target" data-x="-120" data-y="-150"></div>
  <div class="target" data-x="0" data-y="-150"></div>
  <div class="target" data-x="120" data-y="-150"></div>

  <div class="target" data-x="-120" data-y="-80"></div>
  <div class="target" data-x="0" data-y="-80"></div>
  <div class="target" data-x="120" data-y="-80"></div>

</div>

      <div id="message-card" class="message-card hidden">
        <h2>GOOOOL ⚽</h2>
        <p id="message-text"></p>

        <button id="next-btn" class="secondary-btn">
          Continua
        </button>
      </div>
    </section>

    <section id="final-screen" class="screen">
      <h1>Esperienza completata ⚽</h1>

      <div class="final-card">
        <h2>Dario Bernoni</h2>
        <p>Laureato in Ingegneria Informatica</p>

        <div class="skills">
          <div class="skill">
            <span>Creatività</span>
            <span>91</span>
          </div>

          <div class="skill">
            <span>Problem Solving</span>
            <span>96</span>
          </div>

          <div class="skill">
            <span>Teamwork</span>
            <span>93</span>
          </div>
        </div>
      </div>

      <div class="final-buttons">
        <a class="primary-btn link-btn" href="#" target="_blank">
          Scarica CV
        </a>

        <a class="secondary-btn link-btn" href="#" target="_blank">
          LinkedIn
        </a>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
